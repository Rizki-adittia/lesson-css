<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5e</title>
    <style>
        body{
            font-family: Arial;
            background-color: white;
            padding: 40px;
            text-align: center;
        }
        .new{
            color: orange;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .product{
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .title{
            font-size: 36px;
            color: grey;
            margin-bottom: 20px;
        }
        .btn{
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .btn:hover{
            background-color: #005bb5;
        }
    </style>
</head>
<body>
    <div class="new">New</div>
    <div class="product">MacBook Pro</div>
    <div class="title">Supercharged for pros.</div>
    <div class="price">From $1999</div>
    <button class="btn">Buy</button>
</body>
</html>
