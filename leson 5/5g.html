<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5g</title>
    <style>
        body{
            font-family: Arial;
            padding: 40px;
        }
        .container{
            width: 500px;
        }
        .header{
            margin-bottom: 10px;
        }
        .name{
            font-weight: bold;
        }
        .username{
            color: grey;
            margin-left: 5px;
        }
        .time{
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .tag{
            color: #1da1f2;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="name">freeCodeCamp.org</span>
            <span class="username">@freeCodeCamp</span>
            <span class="time">1h</span>
        </div>
        <div class="text">
            As a web devolover, you'll want to make your projects easy 
            to use and navigate aroud.
        </div>
        <div class="text">
            Here <span class="tag">@chp_it</span> outlines
            the top skills new devolover should have.
        </div>
    </div>

</body>
</html>
