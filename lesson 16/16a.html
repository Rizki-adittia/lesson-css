<header class="header">
  <div class="left-section">
    <img class="menu-icon" src="gambar_1.jpg" alt="">
    <img class="youtube-logo" src="gambar_1.jpg" alt="">
  </div>

  <div class="middle-section">
    <input class="search-bar" type="text" placeholder="Search">
    <button class="search-button">
      <img class="search-icon" src="gambar_1.jpg" alt="">
      <div class="tooltip">Search</div>
    </button>
    <button class="voice-search-button">
      <img class="voice-search-icon" src="gambar_1.jpg" alt="">
      <div class="tooltip">Search with your voice</div>
    </button>
  </div>

  <div class="right-section">
    <div class="upload-icon-container">
      <img class="upload-icon" src="menu-burger.png" alt="">
      <div class="tooltip">Create</div>
    </div>

    <div class="youtube-apps-icon-container">
      <img class="youtube-apps-icon" src="youtube (1).png" alt="">
      <div class="tooltip">YouTube apps</div>
    </div>

    <div class="notifications-icon-container">
      <img class="notifications-icon" src="gambar_1.jpg" alt="">
      <div class="tooltip">Notifications</div>
    </div>

    <img class="current-user-picture" src="gambar_1.jpg" alt="">
  </div>
</header>
