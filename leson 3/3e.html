<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3e</title>
    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }
        .linkedin{
            background-color: rgb(10,102,194);
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 16px;
            border-radius: 20px ;
            cursor: pointer;
            transition: 0.3s;
        }
        .linkedin:hover{
            background-color: #004182;
        }
        .linkedin2{
            background-color: white;
            color: rgb(10,102,194);
            padding: 10px 20px;
            border: 1px solid rgb(10,102,194);
            font-size: 16px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .linkedin2:hover{
            background-color: #e6f0fa;
        }
    </style>
</head>
<body>
    <button class="linkedin">Apply on compony website</button>
    <button class="linkedin2">save</button>
</body>
</html>
