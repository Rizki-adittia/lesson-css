<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3c</title>
    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }
        .github{
            background-color: rgb(46,164,79);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: box-shadow 0.3s;
        }
        .github:hover{
            box-shadow: 0 5px 15px rgb(0,0,0,1);        }
    </style>
</head>
<body>
    <button class="github">Sign up</button>
</body>
</html>
