<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d</title>
    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }
        .Bootstrap{
            background-color: #6f42c1;
            color: white;
            padding: 10px 20px ;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .Bootstrap:hover{
            background-color: #5a34a3;
        }
        .Bootstrap2{
            background-color: #e0e0e0;
            color: black;
            padding: 10px 20px ;
            border: 1px solid #ccc;
            font-size: 16px;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .Bootstrap2:hover{
            background-color: #d6d6d6;
        }
    </style>
</head>
<body>
    <button class="Bootstrap">Get started</button> 
    <button class="Bootstrap2">Download</button>
</body>
</html>
