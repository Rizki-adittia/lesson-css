<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>13e</title>
  <link rel="stylesheet" href="13e.css">
</head>
<body>

  <div class="inbox">
    <div class="title">ALL INBOXES</div>

    <div class="email">
      <img src="gambar_1.jpg" alt="Oliver">
      <div class="content">
        <div class="row">
          <div class="sender">Chewy Promotions</div>
          <div class="time">4:58 PM</div>
        </div>
        <div class="subject">Biggest sales of the year!</div>
        <div class="message">Hey there! We're writing to tell you about our latest deals...</div>
      </div>
    </div>

    <div class="email">
      <img src="gambar_1.jpg" alt="Rex">
      <div class="content">
        <div class="row">
          <div class="sender">Best Buy</div>
          <div class="time">12:32 PM</div>
        </div>
        <div class="subject">Your Best Buy eReceipt</div>
        <div class="message">Thank you for shopping at Best Buy...</div>
      </div>
    </div>

    <div class="email">
      <img src="gambar_1.jpg" alt="Mimi">
      <div class="content">
        <div class="row">
          <div class="sender">Netflix</div>
          <div class="time">9:00 AM</div>
        </div>
        <div class="subject">Here's what's coming soon</div>
        <div class="message">Brand new movies and shows are coming...</div>
      </div>
    </div>

  </div>

</body>
</html>
