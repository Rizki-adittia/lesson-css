<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2d</title>
    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }
        .Bootstrap-btn{
            background-color: rgb(121,82,179);
            color: white;
            padding: 10px 20px ;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .Bootstrap2-btn{
            background-color: white;
            color: rgb(121,82,179);
            padding: 10px 20px ;
            border: 1px solid rgb(121,82,179);
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="Bootstrap-btn">Get started</button> 
    <button class="Bootstrap2-btn">Download</button>
</body>
</html>
